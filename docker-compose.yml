name: tc-unified-notes

services:
  react:
    build:
      context: ./
      target: dev
    command: sh -c 'pnpm install && pnpm start --host'
    environment:
      APP_TITLE: ${APP_TITLE:-Unified Notes}
      APP_UNIFIED_API_ENDPOINT: ${APP_UNIFIED_API_ENDPOINT:-https://notes-api.local.togglecorp.com/}
    volumes:
      - .:/code
    ports:
      - '3000:3000'
